# DNS SETUP INSTRUCTIONS:
# -------------------------------------------------------------
# In your domain DNS (where smesh.dev is managed):
# Add CNAME record:
#   Name: admin
#   Value: YOUR_GITHUB_USERNAME.github.io
#
# In GitHub repo Settings -> Pages:
# Custom domain: admin.smesh.dev
#
# In admin/public/ create file CNAME (no extension):
# Content: admin.smesh.dev
#
# This routes admin.smesh.dev -> GitHub Pages -> admin/ build output.
#
# ⚠️ IMPORTANT ARCHITECTURE NOTE:
# GitHub Pages only supports ONE custom domain per repository.
# If "smesh.dev" is already configured as the custom domain for this repository:
# - Setting custom domain to "admin.smesh.dev" will conflict with the main site.
# - Instead, by deploying to the "admin" destination subfolder (destination_dir: admin), 
#   the dashboard will be accessible at "https://smesh.dev/admin/" natively.
# - If you strictly require "https://admin.smesh.dev/", it is recommended to split the 
#   admin/ folder into a separate GitHub repository (e.g. smesh-admin) so Pages can bind 
#   the separate custom subdomain to it independently.
# -------------------------------------------------------------

name: Deploy Admin Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'admin/**'    # only trigger when admin/ changes

jobs:
  build-deploy-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install admin dependencies
        working-directory: admin
        run: npm install

      - name: Build admin
        working-directory: admin
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          PUBLIC_GITHUB_PAT: ${{ secrets.ADMIN_GITHUB_PAT }}
          PUBLIC_GITHUB_REPO: ${{ secrets.GITHUB_REPO }}
        run: npm run build

      - name: Deploy to gh-pages (admin subfolder)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./admin/dist
          destination_dir: admin    # deploys to gh-pages/admin/
